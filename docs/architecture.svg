<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 560" font-family="Segoe UI, Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0a1e"/>
      <stop offset="1" stop-color="#02020d"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#64748b"/>
    </marker>
  </defs>

  <rect width="1040" height="560" rx="16" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="1039" height="559" rx="16" fill="none" stroke="#2a2a5a" stroke-opacity="0.6"/>

  <!-- Title -->
  <text x="40" y="46" fill="#ffffff" font-size="22" font-weight="700">EthicsBoard AI — Multi-Agent IRB Review Pipeline</text>
  <text x="40" y="70" fill="#94a3b8" font-size="13">All handoffs happen via Band @mention routing. The room history is the audit ledger.</text>

  <!-- Researcher -->
  <g>
    <rect x="40" y="110" width="150" height="56" rx="10" fill="#1e293b" stroke="#475569"/>
    <text x="115" y="138" fill="#e2e8f0" font-size="14" font-weight="600" text-anchor="middle">Researcher</text>
    <text x="115" y="156" fill="#94a3b8" font-size="11" text-anchor="middle">uploads protocol PDF</text>
  </g>

  <!-- Protocol Agent -->
  <g>
    <rect x="250" y="100" width="200" height="76" rx="12" fill="#6366f1" fill-opacity="0.12" stroke="#6366f1" stroke-opacity="0.6"/>
    <text x="350" y="128" fill="#a5b4fc" font-size="15" font-weight="700" text-anchor="middle">@ProtocolAgent</text>
    <text x="350" y="147" fill="#cbd5e1" font-size="11" text-anchor="middle">LangGraph · Gemini 2.5 Pro</text>
    <text x="350" y="164" fill="#94a3b8" font-size="10.5" text-anchor="middle">parse PDF · risk-based routing</text>
  </g>

  <!-- routing labels -->
  <text x="350" y="206" fill="#06b6d4" font-size="10.5" text-anchor="middle">MINIMAL → EXPEDITED (46.110)</text>
  <text x="350" y="222" fill="#818cf8" font-size="10.5" text-anchor="middle">GREATER → FULL BOARD (46.108)</text>

  <!-- Parallel specialists box -->
  <rect x="250" y="250" width="520" height="120" rx="12" fill="#a855f7" fill-opacity="0.05" stroke="#a855f7" stroke-opacity="0.35" stroke-dasharray="5 4"/>
  <text x="266" y="270" fill="#c084fc" font-size="10.5" font-weight="700">∥ PARALLEL REVIEWS</text>

  <!-- Ethics Agent -->
  <g>
    <rect x="275" y="284" width="220" height="72" rx="12" fill="#a855f7" fill-opacity="0.12" stroke="#a855f7" stroke-opacity="0.6"/>
    <text x="385" y="311" fill="#d8b4fe" font-size="14" font-weight="700" text-anchor="middle">@EthicsAgent</text>
    <text x="385" y="329" fill="#cbd5e1" font-size="11" text-anchor="middle">Pydantic AI · DeepSeek-R1</text>
    <text x="385" y="346" fill="#94a3b8" font-size="10.5" text-anchor="middle">consent · assent · Belmont</text>
  </g>

  <!-- Privacy Agent -->
  <g>
    <rect x="525" y="284" width="220" height="72" rx="12" fill="#06b6d4" fill-opacity="0.12" stroke="#06b6d4" stroke-opacity="0.6"/>
    <text x="635" y="311" fill="#67e8f9" font-size="14" font-weight="700" text-anchor="middle">@PrivacyAgent</text>
    <text x="635" y="329" fill="#cbd5e1" font-size="11" text-anchor="middle">CrewAI · Claude Sonnet</text>
    <text x="635" y="346" fill="#94a3b8" font-size="10.5" text-anchor="middle">HIPAA · BAA · de-identification</text>
  </g>

  <!-- Committee Agent -->
  <g>
    <rect x="820" y="250" width="190" height="120" rx="12" fill="#f59e0b" fill-opacity="0.12" stroke="#f59e0b" stroke-opacity="0.6"/>
    <text x="915" y="284" fill="#fcd34d" font-size="14" font-weight="700" text-anchor="middle">@CommitteeAgent</text>
    <text x="915" y="302" fill="#cbd5e1" font-size="11" text-anchor="middle">FastAPI · Llama 3.1 70B</text>
    <text x="915" y="324" fill="#94a3b8" font-size="10.5" text-anchor="middle">waits for both reviews</text>
    <text x="915" y="340" fill="#94a3b8" font-size="10.5" text-anchor="middle">challenges Ethics finding</text>
    <text x="915" y="356" fill="#94a3b8" font-size="10.5" text-anchor="middle">escalates if needed</text>
  </g>

  <!-- IRB Chair -->
  <g>
    <rect x="820" y="430" width="190" height="76" rx="12" fill="#10b981" fill-opacity="0.12" stroke="#10b981" stroke-opacity="0.6"/>
    <text x="915" y="458" fill="#6ee7b7" font-size="14" font-weight="700" text-anchor="middle">@Dr.IRBChair</text>
    <text x="915" y="476" fill="#cbd5e1" font-size="11" text-anchor="middle">Human-in-the-Loop</text>
    <text x="915" y="493" fill="#94a3b8" font-size="10.5" text-anchor="middle">binding APPROVE / REVISE / REJECT</text>
  </g>

  <!-- Challenge note -->
  <text x="500" y="430" fill="#fbbf24" font-size="11" font-weight="600" text-anchor="middle">⚔ Agent-to-agent challenge: Committee ⇄ Ethics defends its determination</text>
  <text x="500" y="470" fill="#64748b" font-size="11" text-anchor="middle">add_participant_service pulls the human chair into the Band room for the final binding decision</text>

  <!-- Arrows -->
  <line x1="190" y1="138" x2="246" y2="138" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="350" y1="176" x2="350" y2="246" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="770" y1="310" x2="816" y2="310" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="915" y1="370" x2="915" y2="426" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
</svg>
