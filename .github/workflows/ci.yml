name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# No secrets are used — the live agent pipeline requires Band + LLM
# credentials, so CI only verifies that the frontend builds and the
# Python sources are syntactically valid.
jobs:
  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build

  backend:
    name: Backend syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Byte-compile Python sources
        run: python -m compileall -q agents backend test_backend.py
